<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantraz Registration Form</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.form-container {
    background: #ffffff;
    width: 100%;
    max-width: 600px;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #243b55;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
}

input[type="text"],
input[type="email"],
select,
textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus,
select:focus,
textarea:focus {
    border-color: #243b55;
    outline: none;
}

.radio-group,
.checkbox-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.radio-group label,
.checkbox-group label {
    font-weight: normal;
}

textarea {
    resize: vertical;
    min-height: 80px;
}

button {
    width: 100%;
    padding: 12px;
    background: #243b55;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #141e30;
}
</style>
</head>

<body>

<div class="form-container">
    <h2>Tantraz Event Registration</h2>

    <form>

        <!-- Full Name -->
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>

        <!-- Participation Category -->
        <div class="form-group">
            <label for="category">Participation Category</label>
            <select id="category" name="category" required>
                <option value="">-- Select Category --</option>
                <option value="individual">Individual</option>
                <option value="team">Team</option>
                <option value="audience">Audience</option>
            </select>
        </div>

        <!-- T-Shirt Size -->
        <div class="form-group">
            <label>T-Shirt Size</label>
            <div class="radio-group">
                <label><input type="radio" name="size" value="S" required> S</label>
                <label><input type="radio" name="size" value="M"> M</label>
                <label><input type="radio" name="size" value="L"> L</label>
                <label><input type="radio" name="size" value="XL"> XL</label>
            </div>
        </div>

        <!-- Technical Interests -->
        <div class="form-group">
            <label>Technical Interests</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="interests" value="AI"> AI</label>
                <label><input type="checkbox" name="interests" value="Web Development"> Web Development</label>
                <label><input type="checkbox" name="interests" value="Cloud Computing"> Cloud Computing</label>
            </div>
        </div>

        <!-- Expectations -->
        <div class="form-group">
            <label for="expectations">Expectations / Suggestions</label>
            <textarea id="expectations" name="expectations" placeholder="Share your expectations..."></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit">Register Now</button>

    </form>
</div>

</body>
</html>
